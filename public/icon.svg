<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Cell membrane -->
  <circle cx="16" cy="16" r="14" stroke="url(#cellGrad)" stroke-width="2" fill="none"/>
  <!-- Cytoplasm -->
  <circle cx="16" cy="16" r="12" fill="url(#cellGrad)" fill-opacity="0.15"/>
  <!-- Nucleus -->
  <circle cx="16" cy="16" r="6" fill="url(#cellGrad)"/>
  <!-- Nucleolus -->
  <circle cx="16" cy="16" r="2.5" fill="#fff" fill-opacity="0.9"/>
  <!-- Small organelles -->
  <circle cx="8" cy="12" r="1.5" fill="url(#cellGrad)" fill-opacity="0.6"/>
  <circle cx="24" cy="14" r="1.5" fill="url(#cellGrad)" fill-opacity="0.6"/>
  <circle cx="10" cy="22" r="1.5" fill="url(#cellGrad)" fill-opacity="0.6"/>
  <circle cx="22" cy="22" r="1.5" fill="url(#cellGrad)" fill-opacity="0.6"/>
</svg>
